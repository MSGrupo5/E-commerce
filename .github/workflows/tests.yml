name: Tests

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ecommerce_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      APP_KEY: base64:7x+DYmeBV+JSQQzjlmC71tSmoVIxF2pjpc9qO8Gw6/0=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: ecommerce_test
      DB_USERNAME: root
      DB_PASSWORD: password

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_mysql, xml, ctype, json

      - name: Instalar dependencias PHP
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Instalar dependencias Node
        run: npm install

      - name: Compilar assets Vite
        run: npm run build

      - name: Copiar archivo de entorno
        run: cp .env.example .env

      - name: Ejecutar migraciones
        run: php artisan migrate --force

      - name: Ejecutar tests
        run: php artisan test
